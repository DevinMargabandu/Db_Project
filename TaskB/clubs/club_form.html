<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Club Form</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Create New Club</h1>
            <p>Register a new club in the university system.</p>
        </header>

        <form action="insert_club.php" method="POST">
            <div class="form-group">
                <label for="ClubID">Club ID</label>
                <input type="number" id="ClubID" name="ClubID" placeholder="101" required>
            </div>

            <div class="form-group">
                <label for="ClubName">Club Name</label>
                <input type="text" id="ClubName" name="ClubName" placeholder="Computer Science Society" required>
            </div>

            <div class="form-group">
                <label for="ContactInfo">Contact Email</label>
                <input type="email" id="ContactInfo" name="ContactInfo" placeholder="css@university.edu" required>
            </div>

            <div class="form-group">
                <label for="PresidentID">President (Student ID)</label>
                <input type="number" id="PresidentID" name="PresidentID" placeholder="1001" required>
            </div>

            <div class="form-group">
                <label for="Field">Associated Field</label>
                <select id="Field" name="Field">
                    <option value="Technology">Technology</option>
                    <option value="Arts">Arts</option>
                    <option value="Sports">Sports</option>
                    <option value="Academics">Academics</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <button type="submit">Create Club</button>
        </form>

        <a href="../index.html" class="back-link">← Back to Dashboard</a>
    </div>
</body>

</html>
